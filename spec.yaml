# ---------------------------------------------------------------------------
# Glossary
# ---------------------------------------------------------------------------

glossary:
  - term: "Substrate"
    definition: "Library + Postgres schema + protocol providing coordination and durable state for agent pipelines. Library deployment; one substrate instance per project."
  - term: "Project"
    definition: "Logical unit of related work; corresponds 1:1 to one Postgres database. Hosts one or more workflow definitions."
  - term: "Workflow"
    definition: "Named, versioned declarative state machine describing how a particular kind of work proceeds. A project may register many workflows."
  - term: "Workflow definition"
    definition: "YAML file (validated against substrate's JSON Schema) declaring states, transitions, role-gating, custom fields per work-item-type, link types, attempt threshold, and per-hook retry overrides."
  - term: "Work-item"
    definition: "Discrete unit of trackable work. Has workflow, work-item-type, current state, custom fields, links, needs_review flag, not_before timestamp."
  - term: "Work-item-type"
    definition: "Category within a workflow declaring its own custom fields and allowed link types."
  - term: "Event"
    definition: "Immutable record appended to the per-project event log describing what happened to a work-item. Authoritative history."
  - term: "Actor"
    definition: "Identified entity that performs operations. Has actor_id, actor_kind (agent/human/system), and optional actor_metadata jsonb."
  - term: "Claim"
    definition: "Durable lease an actor holds on a work-item. Has TTL, attempt number, explicit release."
  - term: "Hook"
    definition: "Side effect dispatched on transitions. Sync hooks gate transaction; async hooks queued and dispatched at-least-once."
  - term: "Link"
    definition: "Typed directed reference between work-items in the same project. Created and removed via events."
  - term: "Workflow version"
    definition: "Registered, immutable instance of a workflow definition. Work-items pin the version they were created against."
  - term: "Reasoning log"
    definition: "Existing flat-file convention in the Software Factory. Continues to operate alongside the substrate."

# ---------------------------------------------------------------------------
# Scope
# ---------------------------------------------------------------------------

scope:
  in_scope:
    - "Core schema: work-items, events, claims, actors, links"
    - "Per-project Postgres database isolation (one DB per project)"
    - "Workflow definition format (YAML + JSON Schema), parsing, semantic validation, versioned registry"
    - "Claim lifecycle: acquire, heartbeat/renew, release, expire, auto-steal with attempt tracking"
    - "Transactional event append + denormalized current-state update"
    - "Event log read with structured query shapes"
    - "Structured work-item query against work_items_current (FR-05b): filterable, paginated, indexed"
    - "Replay: rebuild current-state projection from event log into a fresh table"
    - "Sync and async hook dispatch (transition validators: in-transaction, gate commit, no I/O; async hooks via durable queue + LISTEN/NOTIFY + always-on polling)"
    - "Pluggable actor identity verifier (HMAC-SHA256 default; RFC 8785 canonical signing envelope; OIDC-ready)"
    - "Key rotation via key-set-with-status (active/deprecated/revoked); hot-reload via mtime polling"
    - "Startup integrity check (migrations applied; workflow-substrate version compatibility)"
    - "Structured logging + Prometheus metrics (library-mode CollectorRegistry, not HTTP server)"
    - "Concurrency contract: canonical lock target, gap-free event_seq allocator, cross-work-item deadlock prevention"
    - "Projection invariants: work_items_current fully derived from events, drift detection via replay report"
    - "API-layer idempotency: client-supplied UUIDv4 on every mutation; event_id doubles as key for event append"
    - "Public API surface (section 19): protocol, not Postgres connection; library is sole signer; service-wrapping is mechanical"
    - "Consumer expectation boundary (section 20): explicit enumeration of what substrate does NOT do"
  out_of_scope:
    - "Cross-project state, queries, or links"
    - "DB provisioning (operator creates DB; substrate runs migrations)"
    - "Disk-level durability and backups"
    - "Scheduling beyond not_before timestamp"
    - "Retry / SLA / automation engines layered above coordination"
    - "Workflow file composition across files (deferred)"
    - "Notification / paging / email"
    - "Human-facing UI"
    - "Removal of registered workflow versions (registry is append-only)"

