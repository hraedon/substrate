# ---------------------------------------------------------------------------
# Deployment
# ---------------------------------------------------------------------------

deployment:
  defaults:
    docker: true
    kubernetes: "auto"
    readme_style: "github"
    auto_enable_conditions:
      - when: "web_service"
        enable: ["docker", "kubernetes"]
      - when: "cli_tool"
        enable: ["docker"]
      - when: "library"
        enable: []
  constraints:
    - type: "stateful_service"
      service: "postgres"
      image: "postgres:15"
      ports:
        "5432": "5432"
      env:
        POSTGRES_USER: "substrate_test"
        POSTGRES_PASSWORD: "substrate_test"
        POSTGRES_DB: "substrate_test"
  smoke_tests:
    http_endpoints: []
    file_checks: []
    command_checks: []

# ---------------------------------------------------------------------------
# Handoff State
# ---------------------------------------------------------------------------

handoff:
  decisions_made:
    - decision: "Library deployment, in-process Postgres calls"
      rationale: "Simplest, matches per-project isolation. Sidecar migration is additive if non-Python actors arrive."
    - decision: "Hybrid persistence: events authoritative, work_items_current transactionally projected"
      rationale: "Single Postgres transaction per state change. Fast reads + intact history + rebuildable projection. Avoids pure event-sourcing's per-read replay cost."
    - decision: "Postgres-only coordination; substrate is not a durable execution engine"
      rationale: "Keeps substrate small. Temporal-style orchestration is project-layered concern using substrate as durable state record."
    - decision: "Per-project DB isolation; one DB per project; multiple workflows per DB"
      rationale: "Hardest wall, cleanest backup/restore, no cross-project query accidents. Operator provisions DB; substrate runs migrations."
    - decision: "Workflow files versioned in per-project registry; immutable once referenced; work-items pin version; replay validates against historical versions"
      rationale: "Allows non-additive workflow changes (rename state, remove transition) safely. In-flight work continues on its pinned version."
    - decision: "Custom fields per-workflow-per-work-item-type with declared types and ui_visible flag (default false)"
      rationale: "Avoids Jira-style global custom-field bloat. Project designer opts in to UI visibility."
    - decision: "Side effects via hooks: sync (5s default timeout, gates transaction) or async (queue + LISTEN/NOTIFY + always-on polling)"
      rationale: "Sync for must-gate-transition cases; async-default for everything else; polling is correctness mechanism, NOTIFY is latency optimization."
    - decision: "Identity via pluggable verifier; HMAC default with key-set-with-status; events carry key_id; OIDC-ready"
      rationale: "Minimal infra today (HMAC + K3s Secret), maximum flexibility tomorrow (any IdP maps to same actor_id)."
    - decision: "Postgres now() time authority; per-work-item event_seq for total ordering"
      rationale: "Same-transaction events share timestamp (correct); event_seq disambiguates within work-item for replay determinism."
    - decision: "Links are events (link_created / link_removed); current links derived; cross-project links unsupported"
      rationale: "Composes with replay correctness; link history preserved in audit trail."
    - decision: "Substrate does not retry on connection failure; surfaces error to caller"
      rationale: "Substrate doesn't know if a write is safe to retry; that decision belongs to caller with idempotency context."
    - decision: "Workflow registry append-only; no removal primitive"
      rationale: "Operator-level removal is operator's responsibility; orphaned references caught at next replay."
    - decision: "Dead-letter is quarantine, not graveyard; requeue_dead_lettered_hook(id) primitive"
      rationale: "Failed hooks should be replayable when underlying issue is fixed."
    - decision: "Replay outputs fresh projection table; operator decides swap vs. diff"
      rationale: "Composes with 'verify event log is source of truth' use case; replay is verification/recovery, not hot-path."
    - decision: "Concurrency contract: canonical lock target = work_items_current row; READ COMMITTED + row lock; gap-free per-work-item event_seq allocator"
      rationale: "Single canonical serialization mechanism for per-work-item state; prevents multiple agents inferring incompatible locking strategies."
    - decision: "Projection invariant: work_items_current fully derived from events; no out-of-band updates; drift detected via FR-16 replay report"
      rationale: "Events are authoritative; projection is a transactionally-consistent denormalization. Direct mutation outside substrate API is a contract violation detectable by replay."
    - decision: "API-layer idempotency: client-supplied UUIDv4 on every mutation; event_id doubles as event-append idempotency key; optional expected_event_seq for optimistic locking"
      rationale: "Makes caller-side retry across transient failures safe without substrate needing to understand caller idempotency semantics."
    - decision: "Signing: HMAC-SHA256 over RFC 8785 canonical JSON envelope; canonical hash stored alongside signature for jsonb-independent re-verification"
      rationale: "Signature stability must survive Postgres version upgrades that change jsonb canonicalization. Storing canonical hash decouples verification from jsonb round-trip behavior."
    - decision: "Renaming: in-transaction side effects are transition validators (no I/O, gate commit); async side effects are hooks (durable queue, retryable)"
      rationale: "Naming forces correct mental model. Consumers reach for hooks by default; validators are a narrow exception path for work necessarily atomic with the transition."
    - decision: "Closed custom field type vocabulary: string, integer, boolean, timestamp, json, enum, work_item_ref. Expansion requires substrate minor version bump"
      rationale: "Prevents uncontrolled type proliferation; version-gated expansion keeps workflow definitions portable across substrate versions."
    - decision: "Trust tiers on event fields: authenticated (actor_id, key_id) / server-stamped (timestamp, event_seq) / actor-claimed (actor_metadata)"
      rationale: "Consumers (UI, audit tooling, replay validators) must distinguish field trustworthiness. Surfaces role as 'claimed' until enforcement lands."
    - decision: "Structured work-item query (FR-05b) as MVP"
      rationale: "Closes the API gap where agents would otherwise reach into work_items_current directly to discover claimable work. Foundation for federated UI list views."
    - decision: "Public API surface formalized (section 19): protocol, not Postgres connection; library is sole signer; service-wrapping is mechanical"
      rationale: "If the API leaks Postgres internals, every service wrapper becomes architectural. Clean boundary means sidecar/federated-UI service layer is a thin HTTP translation, not a redesign."
    - decision: "Consumer expectation boundary (section 20): explicit enumeration of what substrate does NOT do"
      rationale: "The 'coordination, not orchestration' label is too easily misread. Enumerating non-goals prevents the most common adoption failure: 'I thought substrate would handle X.'"
    - decision: "Per-project DB isolation (BR-13) acknowledged as load-bearing with documented migration path"
      rationale: "DB-per-project is correct at homelab scale. Migration path to tenant_id-in-shared-DB documented so the boundary can shift without API changes when operational pain warrants."

  pending:
    - item: "Workflow file composition (!include / merge)"
      why_deferred: "Premature in v1; loader extension is additive"
      impact_if_wrong: "None until needed; can grow later without breaking single-file workflows"
    - item: "Schema partitioning for events table"
      why_deferred: "Cheap to add when volume warrants; unnecessary at homelab scale"
      impact_if_wrong: "Slow queries when one project becomes high-volume; addressable with month-partition migration"
    - item: "Actor → allowed_roles enforcement"
      why_deferred: "MVP threat model trusts authenticated actors"
      impact_if_wrong: "If trust assumption breaks, role-misdeclaration is detectable post-hoc via event log audit; prevention requires this enforcement"
    - item: "--continue-on-revoked replay flag"
      why_deferred: "Operator tooling, additive"
      impact_if_wrong: "Replay halts on revoked-key events; operator must triage manually until flag exists"
    - item: "OIDC verifier implementation"
      why_deferred: "No human users in MVP"
      impact_if_wrong: "Adding OIDC requires implementing verifier plug; no schema migration to actor model"
    - item: "Sidecar / non-Python integration"
      why_deferred: "All MVP agents are Python"
      impact_if_wrong: "Migration to sidecar is additive (substrate exposes RPC over local socket); no core schema change"
    - item: "Domain-expert distributed-systems correctness review"
      why_deferred: "Resolved 2026-05-05 — two-reviewer correctness pass completed. Findings integrated into spec v2 (sections 17, 18, FR-03/FR-13/FR-15/FR-16/FR-17 revisions, BR-09 strengthened, BR-10/BR-11/BR-12 added, ACs 24-31 added)."
      impact_if_wrong: "N/A — resolved"

  intent_signals:
    - signal: "Generalize it and have it work for all projects more generally"
      relevance: "Substrate must be project-agnostic; resist factory-specific concepts leaking into core schema. Workflow definitions are the project-specific layer."
    - signal: "One source of truth for all projects ... one pane of glass we can feed projects into when we eventually make a human readable UI"
      relevance: "Shape the contract so federated UI is additive, not redesign trigger. ui_visible flag, declarative workflow def, event log read shapes all serve this."
    - signal: "Non-revenue homelab project; license costs are the binding constraint, token spend is not"
      relevance: "Prefer richly-logged, verbose, debug-friendly implementations over throughput-optimized. Avoid per-seat-licensed tools (Linear / Jira-cloud)."
    - signal: "Compose with, not replace, the existing reasoning.log convention"
      relevance: "Substrate must not assume sole ownership of agent state; reasoning.log continues to coexist."
    - signal: "Currently zero humans-in-the-loop, but the design should not foreclose that"
      relevance: "Actor model + identity verifier shaped to accept humans without schema migration; ui_visible flag and pluggable verifier honor this."
    - signal: "Idempotency and exactly-once semantics per task type, not globally"
      relevance: "Substrate does not enforce exactly-once globally; per-hook retry policy and dead-letter behavior are project-tunable; sync-hook-rollback gives exactly-once-per-transition where needed."
    - signal: "What's substrate concern vs. agent concern"
      relevance: "Substrate is coordination + state; agents own work, hooks, scheduling, retries beyond the dispatch primitive. Resist scope creep."
    - signal: "Minimum API surface needs to be to keep a future UI cheap"
      relevance: "Read-event-log primitives (FR-05) and current-state queries are the UI's primary surface; design indexes and query shapes for the UI's future use, not just hot-path agent operations."

