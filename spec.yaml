# ---------------------------------------------------------------------------
# Assumptions
# ---------------------------------------------------------------------------

assumptions:
  - assumption: "Postgres is available on homelab K3s and provides standard ACID semantics"
    rationale: "Stated explicitly in vibe spec"
  - assumption: "Operator runs all agents and trusts them not to misdeclare role at MVP"
    rationale: "Documented threat model boundary; fast-follow when warranted (BR-09)"
  - assumption: "Workflow files authored by operator (not untrusted parties)"
    rationale: "Homelab single-operator context; YAML parsing safety follows"
  - assumption: "License-cost-bound but token-spend unconstrained — substrate may be liberal with logging detail and event payload size"
    rationale: "Stated explicitly in vibe spec"
  - assumption: "Federated UI is downstream and adapts to substrate's contract, not vice versa"
    rationale: "Vibe spec frames UI as future; substrate is authoritative source"
  - assumption: "Python is acceptable as substrate's implementation language for MVP"
    rationale: "Existing factory is Python; Q1 answer 'library; if non-Python needed, trivial to migrate' implies acceptance"

