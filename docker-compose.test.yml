services:
  postgres:
    image: postgres:15
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: substrate_test
      POSTGRES_PASSWORD: substrate_test
      POSTGRES_DB: substrate_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U substrate_test"]
      interval: 1s
      timeout: 3s
      retries: 30
