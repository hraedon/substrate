name: test_workflow
version: 1
substrate_version: "0.1.0"

states:
  - name: new
    initial: true
  - name: in_progress
  - name: review
  - name: done
    terminal: true

transitions:
  - name: start
    from: new
    to: in_progress
    allowed_roles: [agent]
  - name: submit_review
    from: in_progress
    to: review
    allowed_roles: [agent]
  - name: approve
    from: review
    to: done
    allowed_roles: [reviewer]
  - name: reject
    from: review
    to: in_progress
    allowed_roles: [reviewer]

roles:
  - name: agent
  - name: reviewer

work_item_types:
  - name: feature
    custom_fields:
      - name: title
        type: string
        required: true
        ui_visible: true
      - name: priority
        type: enum
        enum_values: [low, medium, high]
        ui_visible: true
      - name: metadata
        type: json
        ui_visible: false
  - name: bug
    custom_fields:
      - name: severity
        type: enum
        enum_values: [minor, major, critical]
        required: true

link_types:
  - name: blocks
    source_type: feature
    target_type: feature
  - name: fixes
    source_type: feature
    target_type: bug

attempt_threshold: 3
