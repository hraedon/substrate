name: software_factory
version: 1
substrate_version: "0.1.0"

states:
  - name: new
    initial: true
  - name: in_progress
  - name: gating
  - name: locked
    terminal: true

transitions:
  - name: claim
    from: new
    to: in_progress
    allowed_roles: [interface_architect]

  - name: submit
    from: in_progress
    to: gating
    allowed_roles: [interface_architect]

  - name: gate_pass
    from: gating
    to: locked
    allowed_roles: [mechanical_gate]

  - name: gate_fail
    from: gating
    to: new
    allowed_roles: [mechanical_gate]

roles:
  - name: interface_architect
  - name: mechanical_gate

work_item_types:
  - name: interface_spec
    custom_fields:
      - name: spec_section
        type: string
        required: true
        ui_visible: true
      - name: ac_ids
        type: json
        required: true
        ui_visible: true
      - name: artifact_path
        type: string
        ui_visible: true
      - name: artifact_hash
        type: string
        ui_visible: false
      - name: diagnostics
        type: json
        ui_visible: false

attempt_threshold: 3
