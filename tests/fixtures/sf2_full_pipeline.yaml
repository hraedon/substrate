name: software_factory
version: 2
substrate_version: "0.1.0"

states:
  - name: new
    initial: true
  - name: in_progress
  - name: gating
  - name: locked
    terminal: true

transitions:
  - name: claim
    from: new
    to: in_progress
    allowed_roles:
      - decomposer
      - interface_architect
      - test_author
      - implementer
      - cross_family_reviewer
      - frontier_judge
      - integrator
      - outcome_verifier
      - coherence_reviewer
      - spec_ambiguity_resolver

  - name: submit
    from: in_progress
    to: gating
    allowed_roles:
      - decomposer
      - interface_architect
      - test_author
      - implementer
      - cross_family_reviewer
      - frontier_judge
      - integrator
      - outcome_verifier
      - coherence_reviewer
      - spec_ambiguity_resolver

  - name: gate_pass
    from: gating
    to: locked
    allowed_roles: [mechanical_gate]

  - name: gate_fail
    from: gating
    to: new
    allowed_roles: [mechanical_gate]

roles:
  - name: decomposer
  - name: interface_architect
  - name: test_author
  - name: implementer
  - name: mechanical_gate
  - name: cross_family_reviewer
  - name: frontier_judge
  - name: integrator
  - name: outcome_verifier
  - name: coherence_reviewer
  - name: spec_ambiguity_resolver

work_item_types:
  - name: feature
    custom_fields:
      - name: spec_section
        type: string
        required: true
        ui_visible: true
      - name: priority
        type: enum
        enum_values: [mvp, required, desirable]
        required: true
        ui_visible: true
      - name: fr_ids
        type: json
        required: true
        ui_visible: true
      - name: dependency_ids
        type: json
        ui_visible: true
      - name: artifact_path
        type: string
        ui_visible: false
      - name: diagnostics
        type: json
        ui_visible: false

  - name: interface_spec
    custom_fields:
      - name: spec_section
        type: string
        required: true
        ui_visible: true
      - name: ac_ids
        type: json
        required: true
        ui_visible: true
      - name: artifact_path
        type: string
        ui_visible: true
      - name: artifact_hash
        type: string
        ui_visible: false
      - name: diagnostics
        type: json
        ui_visible: false

  - name: test_suite
    custom_fields:
      - name: interface_ref
        type: work_item_ref
        target_work_item_type: interface_spec
        required: true
        ui_visible: true
      - name: ac_coverage
        type: json
        required: true
        ui_visible: true
      - name: artifact_path
        type: string
        ui_visible: true
      - name: artifact_hash
        type: string
        ui_visible: false
      - name: diagnostics
        type: json
        ui_visible: false

  - name: implementation
    custom_fields:
      - name: interface_ref
        type: work_item_ref
        target_work_item_type: interface_spec
        required: true
        ui_visible: true
      - name: test_suite_ref
        type: work_item_ref
        target_work_item_type: test_suite
        required: true
        ui_visible: true
      - name: artifact_path
        type: string
        ui_visible: true
      - name: artifact_hash
        type: string
        ui_visible: false
      - name: diagnostics
        type: json
        ui_visible: false

  - name: review
    custom_fields:
      - name: review_type
        type: enum
        enum_values: [cross_family, jury, coherence]
        required: true
        ui_visible: true
      - name: verdict
        type: enum
        enum_values: [pass, fail, disagree]
        ui_visible: true
      - name: rationale
        type: json
        ui_visible: true
      - name: reviewer_family
        type: string
        ui_visible: false

  - name: integration
    custom_fields:
      - name: included_features
        type: json
        required: true
        ui_visible: true
      - name: artifact_path
        type: string
        ui_visible: true
      - name: artifact_hash
        type: string
        ui_visible: false
      - name: diagnostics
        type: json
        ui_visible: false

link_types:
  - name: derived_from
    source_type: feature
    target_type: feature
  - name: has_interface
    source_type: feature
    target_type: interface_spec
  - name: has_tests
    source_type: interface_spec
    target_type: test_suite
  - name: implements
    source_type: implementation
    target_type: interface_spec
  - name: tested_by
    source_type: implementation
    target_type: test_suite
  - name: reviews
    source_type: review
    target_type: implementation
  - name: integrates
    source_type: integration
    target_type: implementation
  - name: revision_of
    source_type: interface_spec
    target_type: interface_spec

attempt_threshold: 3
